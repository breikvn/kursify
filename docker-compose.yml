services:
  db:
    image: gvenzl/oracle-xe:21.3.0
    container_name: oracle-db
    ports:
      - "1521:1521"
      - "5500:5500"
    environment:
      ORACLE_PASSWORD: oracle
    volumes:
      # SQL files in this directory are executed when Oracle initializes a fresh database.
      - ./backend-plsql:/docker-entrypoint-initdb.d

  django:
    build: ./backend
    container_name: django-backend
    command: sh -c "python wait_for_oracle.py && python manage.py runserver 0.0.0.0:8000"
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      - db

  angular:
    build: ./frontend-angular
    container_name: angular-frontend
    ports:
      - "4200:4200"
    volumes:
      - ./frontend-angular:/usr/src/app
      - /usr/src/app/node_modules
    command: npm start
    depends_on:
      - django
