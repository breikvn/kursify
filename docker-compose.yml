services:
  db:
    platform: linux/amd64
    image: gvenzl/oracle-xe:21.3.0
    container_name: oracle-db
    ports:
      - "1521:1521"
      - "5500:5500"
    environment:
      ORACLE_PASSWORD: oracle

  schema-init:
    platform: linux/amd64
    image: gvenzl/oracle-xe:21.3.0
    container_name: oracle-schema-init
    depends_on:
      - db
    restart: "no"
    entrypoint:
      - sh
      - -c
    command:
      - "until printf 'SET HEADING OFF\\nSELECT ''READY'' FROM dual;\\nEXIT\\n' | sqlplus -s system/oracle@//db:1521/XEPDB1 | grep -q 'READY'; do sleep 2; done; sqlplus system/oracle@//db:1521/XEPDB1 @/schema/01_SQL_Schema_HR.sql"
    volumes:
      - ./backend-plsql/schema:/schema:ro

  django:
    build: ./backend
    container_name: django-backend
    command: sh -c "python wait_for_oracle.py && python manage.py runserver 0.0.0.0:8000"
    ports:
      - "8000:8000"
    environment:
      ORACLE_SERVICE_NAME: xepdb1
    volumes:
      - ./backend:/app
    depends_on:
      schema-init:
        condition: service_completed_successfully

  angular:
    build: ./frontend-angular
    container_name: angular-frontend
    ports:
      - "4200:4200"
    volumes:
      - ./frontend-angular:/usr/src/app
      - /usr/src/app/node_modules
    command: npm start
    depends_on:
      - django
