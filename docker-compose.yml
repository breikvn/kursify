services:
  db:
    platform: linux/amd64
    image: gvenzl/oracle-xe:21.3.0
    container_name: oracle-db
    ports:
      - "1521:1521"
      - "5500:5500"
    environment:
      ORACLE_PASSWORD: oracle

  schema-init:
    platform: linux/amd64
    image: gvenzl/oracle-xe:21.3.0
    container_name: oracle-schema-init
    depends_on:
      - db
    restart: "no"
    entrypoint:
      - sh
      - -c
    command:
      - "until printf 'SET HEADING OFF\\nSELECT ''READY'' FROM dual;\\nEXIT\\n' | sqlplus -s system/oracle@//db:1521/XEPDB1 | grep -q 'READY'; do sleep 2; done; sqlplus system/oracle@//db:1521/XEPDB1 @/schema/01_SQL_Schema_HR.sql"
    volumes:
      - ./backend-plsql/schema:/schema:ro

  django:
    build: ./backend
    container_name: django-backend
    command: sh -c "python wait_for_oracle.py && python manage.py runserver 0.0.0.0:8000"
    ports:
      - "8000:8000"
    env_file:
      - path: .env
        required: false
    environment:
      ORACLE_SERVICE_NAME: xepdb1
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_EMAIL_MODEL: ${OLLAMA_EMAIL_MODEL:-}
      EMAIL_BACKEND: ${EMAIL_BACKEND:-django.core.mail.backends.smtp.EmailBackend}
      EMAIL_HOST: ${EMAIL_HOST:-}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER:-}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD:-}
      EMAIL_USE_TLS: ${EMAIL_USE_TLS:-true}
      EMAIL_USE_SSL: ${EMAIL_USE_SSL:-false}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL:-no-reply@kursify.local}
    volumes:
      - ./backend:/app
    depends_on:
      schema-init:
        condition: service_completed_successfully
      ollama:
        condition: service_started

  angular:
    build: ./frontend-angular
    container_name: angular-frontend
    ports:
      - "4200:4200"
    volumes:
      - ./frontend-angular:/usr/src/app
      - /usr/src/app/node_modules
    command: npm start
    depends_on:
      - django

  ords:
    image: container-registry.oracle.com/database/ords:latest
    container_name: oracle-ords
    ports:
      - "8080:8080"
    environment:
      DBHOST: db
      DBPORT: 1521
      DBSERVICENAME: XEPDB1
      ORACLE_PWD: oracle
    volumes:
      - ords_config:/etc/ords/config
    depends_on:
      - db

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

volumes:
  ollama_data:
  ords_config:
